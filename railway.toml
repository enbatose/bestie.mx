# Production: add a volume (e.g. mount at /data) and set DATABASE_PATH=/data/bestie.db on the API service.
# Uploads default to /data/uploads/ next to the DB (or set UPLOAD_DIR). See README → "Production — SQLite + image uploads".

[build]
# Railpack may run the build step with cwd under `server/`, which only runs `tsc` and skips the root Vite SPA build.
# Always run the monorepo's root `package.json` build from /app so `server/dist` + `/dist` exist.
buildCommand = "cd /app && npm run build"

[deploy]
# Run Node directly (not `npm run start`) so Railway SIGTERM reaches the app and
# you avoid extra npm parent memory + misleading `npm error signal SIGTERM` on shutdown.
# Use absolute paths so cwd is correct even if the container WORKDIR is not `/app` (fixes SPA `../dist` resolution and avoids flaky `[ -d server ]`).
startCommand = "sh -ce 'if [ -f /app/server/dist/index.js ]; then cd /app/server; elif [ -f /app/dist/index.js ]; then cd /app; else echo \"bestie: missing /app/server/dist/index.js and /app/dist/index.js\" >&2; exit 1; fi; exec node dist/index.js'"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
