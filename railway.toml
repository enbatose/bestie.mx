# Production: add a volume (e.g. mount at /data) and set DATABASE_PATH=/data/bestie.db on the API service.
# Uploads default to /data/uploads/ next to the DB (or set UPLOAD_DIR). See README → "Production — SQLite + image uploads".

[deploy]
# Run Node directly (not `npm run start`) so Railway SIGTERM reaches the app and
# you avoid extra npm parent memory + misleading `npm error signal SIGTERM` on shutdown.
startCommand = "cd server && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
