# Production: add a volume (e.g. mount at /data) and set DATABASE_PATH=/data/bestie.db on the API service.
# Uploads default to /data/uploads/ next to the DB (or set UPLOAD_DIR). See README → "Production — SQLite + image uploads".
#
# Build + start are defined in `./Dockerfile` (Railway prefers Dockerfile over Railpack when both exist).

[deploy]
# Overrides any stale “Custom start command” in the Railway UI (config-as-code wins on deploy).
# Use paths relative to the service root. When the root directory is `server/` (common with Railpack),
# the bundle is `dist/index.js`. The Dockerfile runner uses the same layout (WORKDIR /app/server).
startCommand = "node dist/index.js"
healthcheckPath = "/health"
# Default Railway window is 5m; allow slow volume/SQLite cold open before the HTTP server binds.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
