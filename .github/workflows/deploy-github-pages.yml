# Deploy static site to GitHub Pages (custom domain supported).
# Repo → Settings → Pages → Build: GitHub Actions, then add your domain under "Custom domain".
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        env:
          # Required for static hosting: POST /api on Pages returns 405. Set in repo Settings → Secrets.
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          if [ -z "$VITE_API_URL" ]; then
            echo "::warning::VITE_API_URL is empty. Add repository secret VITE_API_URL with your public API origin (no trailing slash), then redeploy."
          fi
          npm run build

      # GitHub Pages serves 404.html for unknown paths — copy SPA shell so React Router works on refresh.
      - name: SPA fallback for client-side routes
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
